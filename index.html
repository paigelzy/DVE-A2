<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Premium Baby Care Device</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #faf8f6;
      color: #444;
    }

    model-viewer {
      width: 100vw;
      height: 75vh;
      background: #ffffff;
    }

    .title {
      text-align: center;
      padding: 20px 0 10px;
      font-size: 22px;
      font-weight: 500;
    }


    /* ---------- PRODUCT PANEL ---------- */

    .product-panel {
      background: #ffffff;
      padding: 30px 40px;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
      max-width: 1200px;
      margin: auto;
    }

    h3 {
      margin-bottom: 15px;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #999;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: #f4f1ee;
      border: none;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #f7c6cf;
      color: white;
    }

    .primary-btn {
      background: #f7c6cf;
      color: white;
      font-weight: 500;
    }

    .primary-btn:hover {
      background: #f4a8b6;
    }

  </style>
</head>

<body>

<div class="title">Buds</div>

<model-viewer
  id="gear"
  src="modeller.glb"
  ar
  camera-controls
  shadow-intensity="1"
  tone-mapping="neutral"
  field-of-view="30deg">

  <!-- HOTSPOTS -->

      <button class="Hotspot" slot="hotspot-1" data-surface="4 1 8813 8781 8812 0.679 0.101 0.220" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Handle</div>
      </button><button class="Hotspot" slot="hotspot-2" data-surface="4 0 135 128 127 0.733 0.056 0.211" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Screen</div>
      </button><button class="Hotspot" slot="hotspot-4" data-surface="6 1 9572 9561 9560 0.781 0.209 0.011" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Dryer</div>
      </button><button class="Hotspot" slot="hotspot-5" data-surface="6 1 12640 12650 12651 0.203 0.013 0.784" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">Scrubber</div>
      </button>


</model-viewer>


<div class="product-panel">
  <div class="panel-grid">

    <div>
      <h3>Color Options</h3>
      <div class="btn-group">
        <button onclick="setVariant('v1')">Soft Pink</button>
        <button onclick="setVariant('v2')">Powder Blue</button>
        <button onclick="setVariant('v3')">Classic White</button>
      </div>
    </div>

    <div>
      <h3>View</h3>
      <div class="btn-group">
        <button onclick="setOrbit('-59deg 74deg 1m')">Side</button>
        <button onclick="setOrbit('-60deg 6deg 1m')">Top</button>
        <button onclick="setOrbit('-61deg 180deg 1m')">Bottom</button>
      </div>
    </div>

    <div>
      <h3>Animations</h3>
      <div class="btn-group">
        <button onclick="playAnimation('Layer 02(D0CEB728-5A1A-4544-A10A-61E11D534D80)Action')">Handle 1</button>
        <button onclick="playAnimation('Layer 02(D0CEB728-5A1A-4544-A10A-61E11D534D80)Action.001')">Handle 2</button>
        <button onclick="playAnimation('scrubbers(34A2A156-0ADA-4CDB-8A44-3EA0F12DBC4F)Action')">Scrubber</button>
        <button class="primary-btn" onclick="pauseAll()">Pause</button>
      </div>
    </div>

  </div>
</div>


<script>
const viewer = document.getElementById("gear");

function setVariant(name) {
  viewer.variantName = name;
}

function setOrbit(orbit) {
  viewer.cameraOrbit = orbit;
}

function playAnimation(name) {
  viewer.pause();
  viewer.animationName = name;
  viewer.currentTime = 0;
  viewer.play({ repetitions: Infinity });
}

function pauseAll() {
  viewer.pause();
}
</script>

</body>
</html>
